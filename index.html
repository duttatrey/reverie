        function App() {
            const [activeEngine, setActiveEngine] = useState('space');
            const currentEngine = ENGINE_PROFILES[activeEngine];

            const [isPlaying, setIsPlaying] = useState(false);
            const [bpm, setBpm] = useState(currentEngine.defaultBpm);
            const [currentStep, setCurrentStep] = useState(-1);
            const [isAmbientMode, setIsAmbientMode] = useState(true);
            const [activePresetIdx, setActivePresetIdx] = useState(0);
            
            const [exportSeconds, setExportSeconds] = useState(30); 
            const [batchSize, setBatchSize] = useState(1);
            const [isExporting, setIsExporting] = useState(false);
            const [isSingleExporting, setIsSingleExporting] = useState(false);
            const [batchStatus, setBatchStatus] = useState({ current: 0, total: 0, currentProgress: 0 });
            
            const [variations, setVariations] = useState({ sub: 0, arp: 1, pings: 0 });

            const [masterVolume, setMasterVolume] = useState(0.80);
            const [channelVolumes, setChannelVolumes] = useState({
                pad: 0.55, sub: 0.60, arp: 0.35, pings: 0.20, wash: 0.25
            });

            const audioCtxRef = useRef(null);
            const masterGainNodeRef = useRef(null);
            const schedulerTimerRef = useRef(null);
            const nextNoteTimeRef = useRef(0.0);
            const internalStepRef = useRef(0);
            
            const bpmRef = useRef(bpm);
            const masterVolRef = useRef(masterVolume);
            const volumesRef = useRef(channelVolumes);
            const variationsRef = useRef(variations);
            const presetIdxRef = useRef(activePresetIdx);
            const isAmbientRef = useRef(isAmbientMode);
            const activeEngineRef = useRef(activeEngine);

            useEffect(() => { bpmRef.current = bpm; }, [bpm]);
            useEffect(() => { 
                masterVolRef.current = masterVolume;
                if (masterGainNodeRef.current && audioCtxRef.current) {
                    masterGainNodeRef.current.gain.setTargetAtTime(masterVolume, audioCtxRef.current.currentTime, 0.02);
                }
            }, [masterVolume]);
            useEffect(() => { volumesRef.current = channelVolumes; }, [channelVolumes]);
            useEffect(() => { variationsRef.current = variations; }, [variations]);
            useEffect(() => { presetIdxRef.current = activePresetIdx; }, [activePresetIdx]);
            useEffect(() => { isAmbientRef.current = isAmbientMode; }, [isAmbientMode]);
            useEffect(() => { activeEngineRef.current = activeEngine; }, [activeEngine]);

            useEffect(() => {
                haltAudioEngine();
                setBpm(ENGINE_PROFILES[activeEngine].defaultBpm);
                setActivePresetIdx(0);
                setVariations({ sub: 0, arp: 1, pings: 0 });
            }, [activeEngine]);

            const initAudioContextHardwareGraph = () => {
                if (!audioCtxRef.current) {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    audioCtxRef.current = ctx;

                    masterGainNodeRef.current = ctx.createGain();
                    masterGainNodeRef.current.gain.setValueAtTime(masterVolume, ctx.currentTime);

                    const masterLimiter = ctx.createDynamicsCompressor();
                    masterLimiter.threshold.setValueAtTime(-2.0, ctx.currentTime); 
                    masterLimiter.knee.setValueAtTime(2.5, ctx.currentTime);       
                    masterLimiter.ratio.setValueAtTime(20.0, ctx.currentTime);     
                    masterLimiter.attack.setValueAtTime(0.001, ctx.currentTime);   
                    masterLimiter.release.setValueAtTime(0.04, ctx.currentTime);

                    masterGainNodeRef.current.connect(masterLimiter);
                    masterLimiter.connect(ctx.destination);
                }
                // CRITICAL HARDWARE ROUTER FIX: Forces browser to unlock state restrictions instantly upon mouse hook
                if (audioCtxRef.current.state === 'suspended') {
                    audioCtxRef.current.resume();
                }
            };

            const haltAudioEngine = () => {
                setIsPlaying(false);
                setCurrentStep(-1);
                internalStepRef.current = 0;
                if (schedulerTimerRef.current) {
                    clearInterval(schedulerTimerRef.current);
                    schedulerTimerRef.current = null;
                }
            };

            const startAudioEngine = () => {
                if (isExporting || isSingleExporting) return;
                initAudioContextHardwareGraph();
                setIsPlaying(true);
                nextNoteTimeRef.current = audioCtxRef.current.currentTime + 0.05;
                if (!schedulerTimerRef.current) {
                    schedulerTimerRef.current = setInterval(clockScheduler, 25);
                }
            };

            const getActiveChordForPreset = (stepIndex, engine, targetPresetIdx) => {
                const activeBank = engine.presets[targetPresetIdx] || engine.presets[0];
                const cycle = Math.floor(stepIndex / 16) % activeBank.chords.length;
                return activeBank.chords[cycle];
            };

            const playStudioPad = (ctx, destination, time, chord, currentVol) => {
                if (!chord || currentVol <= 0.001) return;
                
                const engine = activeEngineRef.current;
                const nodeFilter = ctx.createBiquadFilter();
                
                let optionalNotchNode = null;
                if (engine === 'deepFocus') {
                    optionalNotchNode = ctx.createBiquadFilter();
                    optionalNotchNode.type = 'notch';
                    optionalNotchNode.frequency.setValueAtTime(850, time); 
                    optionalNotchNode.Q.setValueAtTime(0.4, time);
                }

                nodeFilter.type = 'lowpass';
                if (engine === 'lofi') {
                    nodeFilter.frequency.setValueAtTime(Math.min(360, chord[0] * 2.2), time);
                    nodeFilter.Q.setValueAtTime(0.3, time);
                } else if (engine === 'cinema') {
                    nodeFilter.frequency.setValueAtTime(420, time);
                    nodeFilter.Q.setValueAtTime(0.2, time);
                } else if (engine === 'deepFocus') {
                    nodeFilter.frequency.setValueAtTime(290, time);
                    nodeFilter.Q.setValueAtTime(0.1, time);
                } else if (engine === 'futureGarage') {
                    nodeFilter.frequency.setValueAtTime(550, time);
                    nodeFilter.Q.setValueAtTime(0.2, time);
                } else {
                    nodeFilter.frequency.setValueAtTime(isAmbientRef.current ? 600 : 850, time);
                }

                const attack = (engine === 'deepFocus') ? 3.8 : 0.8;
                const release = (engine === 'deepFocus') ? 4.5 : 2.0;

                chord.slice(0, 3).forEach((freq, idx) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    osc.type = (engine === 'deepFocus' || engine === 'futureGarage') ? 'sine' : ENGINE_PROFILES[engine].padWave;
                    
                    osc.frequency.setValueAtTime(freq, time);
                    osc.detune.setValueAtTime(idx * 4.0 - 4.0, time);

                    gain.gain.setValueAtTime(0.001, time);
                    const targetGain = (engine === 'deepFocus') ? 0.12 : 0.08;
                    gain.gain.linearRampToValueAtTime(targetGain * currentVol, time + attack);
                    gain.gain.setValueAtTime(targetGain * currentVol, time + attack + 1.5);
                    gain.gain.exponentialRampToValueAtTime(0.001, time + attack + release);

                    osc.connect(gain);
                    if (optionalNotchNode) {
                        gain.connect(optionalNotchNode); optionalNotchNode.connect(nodeFilter);
                    } else {
                        gain.connect(nodeFilter);
                    }
                    nodeFilter.connect(destination);

                        React.createElement('div', { className: 'space-y-2' },
                            React.createElement('h3', { className: `text-xs uppercase font-bold tracking-wider ${currentEngine.themeClass}` }, '03 / Automated Batch Exporter Center'),
                            React.createElement('div', { className: 'grid grid-cols-2 gap-2 mb-2' },
                                React.createElement('div', null,
                                    React.createElement('label', { className: 'text-[10px] text-slate-500 uppercase block mb-1 font-bold' }, 'Length'),
                                    React.createElement('select', {
                                        value: exportSeconds, onChange: (e) => setExportSeconds(Number(e.target.value)),
                                        disabled: isProcessing,
                                        className: 'w-full bg-black border border-slate-900 text-slate-400 font-mono text-xs rounded p-2 cursor-pointer focus:outline-none'
                                    },
                                        React.createElement('option', { value: 30 }, '30 Sec'),
                                        React.createElement('option', { value: 60 }, '1 Min'),
                                        React.createElement('option', { value: 180 }, '3 Min'),
                                        React.createElement('option', { value: 300 }, '5 Min'),
                                        React.createElement('option', { value: 600 }, '10 Min')
                                    )
                                ),
                                React.createElement('div', null,
                                    React.createElement('label', { className: 'text-[10px] text-slate-500 uppercase block mb-1 font-bold' }, 'Batch Size'),
                                    React.createElement('select', {
                                        value: batchSize, onChange: (e) => setBatchSize(Number(e.target.value)),
                                        disabled: isProcessing,
                                        className: 'w-full bg-black border border-slate-900 text-slate-400 font-mono text-xs rounded p-2 cursor-pointer focus:outline-none'
                                    },
                                        [1, 2, 5, 10].map(val => 
                                            React.createElement('option', { key: val, value: val }, `${val} ${val === 1 ? 'Track' : 'Tracks'}`)
                                        )
                                    )
                                )
                            ),
                            React.createElement('div', { className: 'flex gap-2' },
                                React.createElement('button', {
                                    onClick: triggerSingleCustomExport, 
                                    disabled: isProcessing,
                                    className: `flex-1 py-2 px-1 rounded font-hud font-bold text-[9px] sm:text-[10px] tracking-tight border transition-all cursor-pointer ${isSingleExporting ? 'bg-zinc-900 text-yellow-400 border-zinc-800 animate-pulse' : 'bg-black text-yellow-400 border-yellow-500/30 hover:bg-yellow-500/10'}`
                                }, isSingleExporting ? `MIXING ${batchStatus.currentProgress}%` : '💾 BAKE MIX'),
                                React.createElement('button', {
                                    onClick: triggerBatchExport, 
                                    disabled: isProcessing,
                                    className: `flex-1 py-2 px-1 rounded font-hud font-bold text-[9px] sm:text-[10px] tracking-tight border transition-all cursor-pointer ${isExporting ? 'bg-zinc-900 text-yellow-500 border-zinc-800 animate-pulse' : 'bg-black text-yellow-400 border-yellow-500/30 hover:bg-yellow-500/10'}`
                                }, isExporting ? `BATCH [${batchStatus.current}/${batchStatus.total}]` : '💾 RUN BATCH')
                            )
                        )
                    ),

                    // Active Engine Preset Bank Switching Grid Matrix
                    React.createElement('div', { className: 'bg-black/30 border border-slate-900/40 p-3 sm:p-4 rounded-xl mb-6 space-y-3' },
                        React.createElement('div', null,
                            React.createElement('span', { className: 'text-[10px] text-slate-500 uppercase tracking-widest block font-bold' }, 'Active Dynamic Vault Preset Channel'),
                            React.createElement('span', { className: `text-xs sm:text-sm font-hud font-black ${currentEngine.themeClass}` }, `${activePresetIdx < 9 ? '0' : ''}${activePresetIdx + 1} // ${currentEngine.presets[activePresetIdx].name}`)
                        ),
                        React.createElement('div', { className: 'grid grid-cols-2 sm:grid-cols-5 lg:grid-cols-10 gap-2' },
                            currentEngine.presets.map((p, idx) => React.createElement('button', {
                                key: idx, onClick: () => setActivePresetIdx(idx),
                                disabled: isProcessing,
                                className: `p-2 rounded font-hud font-bold border transition-all text-center flex flex-col justify-center items-center cursor-pointer ${activePresetIdx === idx ? 'bg-slate-900 text-white border-slate-600 shadow-md shadow-black scale-[1.03]' : 'bg-black/40 text-slate-500 border-slate-950 hover:text-slate-400'} disabled:opacity-20`
                            }, 
                                React.createElement('span', { className: 'text-xs block font-black' }, idx < 9 ? `0${idx + 1}` : idx + 1),
                                React.createElement('span', { className: 'text-[8px] font-mono opacity-50 block truncate max-w-full' }, p.name.split(' (')[0].split(' ')[0])
                            ))
                        )
                    ),

                    // Multi-Channel Mixing Console Strip Array
                    React.createElement('div', { className: 'space-y-4' },
                        [
                            { id: 'pad', name: activeEngine === 'cinema' ? 'Felt String Ensemble' : activeEngine === 'space' ? 'Deep Space Pad' : activeEngine === 'lofi' ? 'Lo-Fi Piano Pad' : activeEngine === 'deepFocus' ? 'Notched Sine Focus Pad' : 'Muted Organ Suspensions', icon: '🌌', detail: 'Cycles rolling harmonic layers' },
                            { id: 'sub', name: activeEngine === 'cinema' ? 'Double-Bass Drone' : activeEngine === 'deepFocus' ? '50Hz Sub Root Anchor' : activeEngine === 'futureGarage' ? 'Dual-Tone Reese Overtones' : 'Sub Bass Floor', icon: '🕳️', detail: 'Tracks foundational root structures', isReRollable: activeEngine !== 'deepFocus', rKey: 'sub' },
                            { id: 'arp', name: activeEngine === 'cinema' ? 'Felt Piano Ostinato' : activeEngine === 'deepFocus' ? 'Damp Focus Glints' : activeEngine === 'futureGarage' ? 'Tight Noise Ghost Shuffles' : 'Arpeggio Melody', icon: '🛰️', detail: 'Generates rhythmic lines', isReRollable: activeEngine !== 'futureGarage', rKey: 'arp' },
                            { id: 'pings', name: activeEngine === 'cinema' ? 'Violin Pizzicato Pluck' : activeEngine === 'deepFocus' || activeEngine === 'futureGarage' ? 'High Accent Filter (Muted)' : 'Rhythmic Beeps', icon: '📟', detail: 'Fires transient high accents', isReRollable: activeEngine !== 'deepFocus' && activeEngine !== 'futureGarage', rKey: 'pings' },
                            { id: 'wash', name: activeEngine === 'cinema' ? 'Acoustic Studio Room Air' : activeEngine === 'space' ? 'Stellar Noise Wash' : activeEngine === 'lofi' ? 'Vinyl Noise Wash' : activeEngine === 'deepFocus' ? 'Cognitive White Noise Layer' : 'Tight Decay Rain Shuffles', icon: '💨', detail: 'Sweeps filtered texture noise fields' }
                        ].map(track => {
                            return React.createElement('div', { key: track.id, className: 'bg-black/20 p-3 sm:p-4 rounded-xl border border-slate-900/60 flex flex-col lg:flex-row items-center gap-4' },
                                // Channel strip identification panel block
                                React.createElement('div', { className: 'w-full lg:w-64 flex justify-between items-center bg-black/40 p-2 rounded-lg border border-slate-950 gap-2' },
                                    React.createElement('div', { className: 'truncate flex-1' },
                                        React.createElement('div', { className: 'text-xs text-slate-300 font-bold truncate' }, `${track.icon} ${track.name}`),
                                        React.createElement('div', { className: 'text-[10px] text-slate-500 tracking-tight mt-0.5 leading-none' }, track.detail)
                                    ),
                                    React.createElement('div', { className: 'flex items-center gap-1.5' },
                                        track.isReRollable && React.createElement('button', {
                                            onClick: () => rollTrackVariation(track.rKey),
                                            disabled: isProcessing,
                                            className: 'p-1.5 bg-slate-950 border border-slate-900 rounded text-[10px] text-slate-400 hover:bg-zinc-900 hover:text-slate-200 cursor-pointer disabled:opacity-25'
                                        }, '🔄')
                                    )
                                ),

                                // Individual Channel Mixing Desk Attenuator Slider
                                React.createElement('div', { className: 'w-full lg:w-44 bg-black/40 px-3 py-1.5 rounded-lg border border-slate-950/60 flex items-center gap-3' },
                                    React.createElement('span', { className: 'text-[9px] font-mono tracking-widest text-slate-500 font-bold' }, 'GAIN'),
                                    React.createElement('input', {
                                        type: 'range', min: 0.0, max: 1.0, step: 0.02,
                                        value: channelVolumes[track.id],
                                        disabled: isProcessing,
                                        onChange: (e) => updateChannelVolumeValue(track.id, e.target.value),
                                        className: 'flex-1 accent-emerald-500 h-1 bg-slate-950 rounded cursor-pointer'
                                    }),
                                    React.createElement('span', { className: 'text-[10px] font-mono text-slate-400 w-8 text-right font-bold' }, 
                                        `${Math.round(channelVolumes[track.id] * 100)}%`
                                    )
                                ),

                                // Rhythmic Visual Step Indicator Line (Folds layout cleanly on mobile screen viewports)
                                React.createElement('div', { className: 'w-full flex-1 grid grid-cols-8 sm:grid-cols-16 gap-1' },
                                    Array.from({ length: 16 }).map((_, stepIdx) => {
                                        const isCurrent = currentStep === stepIdx;
                                        const baseBlockStyle = isCurrent ? currentEngine.gridStyles : { backgroundColor: '#090d16', border: '1px solid #111827' };
                                        return React.createElement('div', {
                                            key: stepIdx,
                                            style: baseBlockStyle,
                                            className: 'h-6 sm:h-7 rounded relative transition-all duration-100'
                                        });
                                    })
                                )
                            );
                        })
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
